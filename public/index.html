<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0" />
  <title>Catatan Saya</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
    .hidden-view { display: none; }
    .glass-nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
    .stabilo-blue { background-color:#2563eb; color:#fff; padding:2px 10px; border-radius:4px; font-weight:800; display:inline-block; }
    .wrap-safe { overflow-wrap: break-word; word-break: break-word; }
    .modal-scroll { max-height: 65vh; overflow-y: auto; }

    /* clamp 5 baris untuk preview isi */
    .clamp-5 {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 5;
      overflow: hidden;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(37,99,235,0.10);
      color: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 150ms ease, transform 80ms ease;
    }
    .icon-btn:hover { background: rgba(37,99,235,0.16); }
    .icon-btn:active { transform: scale(0.98); }
    .icon-btn-solid {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: #2563eb;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(37,99,235,0.25);
      transition: transform 120ms ease;
    }
    .icon-btn-solid:active { transform: scale(0.95); }

    /* Popup merah untuk login error */
    .login-toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      top: 18px;
      z-index: 9999;
      max-width: 92vw;
      width: 420px;
    }
  </style>
</head>

<body class="antialiased text-slate-900">

  <!-- Popup merah (awal hidden) -->
  <div id="login-error" class="login-toast hidden">
    <div class="bg-red-600 text-white px-5 py-4 rounded-2xl shadow-2xl flex items-center justify-between gap-4">
      <div class="text-sm font-extrabold uppercase tracking-widest">Kode Salah</div>
      <button onclick="hideLoginError()" class="text-white/80 hover:text-white font-black text-sm">TUTUP</button>
    </div>
  </div>

  <!-- Login -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center p-8 bg-slate-50">
    <div class="w-full max-w-sm text-center bg-white p-10 rounded-[2.5rem] shadow-xl shadow-slate-200/50">
      <h2 class="text-4xl font-black mb-2 tracking-tighter">Login</h2>

      <input type="password" id="access-input"
        class="w-full bg-slate-100 p-5 rounded-2xl mb-4 text-center text-xl font-bold focus:ring-2 focus:ring-blue-600 outline-none transition-all"
        placeholder="••••••"
        onkeydown="if(event.key==='Enter'){ login(); }">

      <button onclick="login()" id="btn-login"
        class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black active:scale-95 transition-all shadow-lg shadow-blue-200">
        MASUK
      </button>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden-view">

    <nav class="fixed top-0 left-0 right-0 glass-nav z-50 border-b border-slate-100">
      <div class="max-w-xl mx-auto px-6 h-20 flex justify-between items-center">
        <h1 class="text-xl font-black tracking-tighter">CATATAN SAYA</h1>
        <div class="flex items-center gap-4">
          <button onclick="showView('form')" class="icon-btn-solid" title="Tambah">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
            </svg>
          </button>

          <button onclick="logout()" class="icon-btn-solid" title="Keluar">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- List -->
    <div id="view-list" class="max-w-xl mx-auto px-6 pt-28 pb-10">
      <div class="flex items-center justify-between mb-6">
        <div>
          <div class="text-xs font-black uppercase tracking-[0.2em] text-slate-400">Daftar catatan</div>
          <div id="count-notes" class="text-[10px] font-bold text-slate-400 mt-1"></div>
        </div>

        <!-- Refresh: Tabler refresh -->
        <button onclick="fetchNotes()" class="icon-btn" title="Refresh">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
            <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4" />
            <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4" />
          </svg>
        </button>
      </div>

      <div id="notes-container" class="grid grid-cols-2 gap-4"></div>
    </div>

    <!-- Form -->
    <div id="view-form" class="hidden-view fixed inset-0 bg-white z-[60] overflow-y-auto">
      <div class="max-w-xl mx-auto px-6 py-10">

        <div class="flex justify-between items-center mb-10">
          <div id="form-title" class="text-xs font-black uppercase tracking-[0.2em] text-slate-400">
            Tambah Catatan
          </div>

          <div class="flex items-center gap-2">
            <button onclick="showView('list')" class="icon-btn" title="Batal">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
              </svg>
            </button>

            <button onclick="saveNote()" id="btn-save-icon" class="icon-btn" title="Simpan">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
              </svg>
            </button>
          </div>
        </div>

        <div class="space-y-6">
          <input type="hidden" id="note-id">

          <div class="bg-slate-50 p-5 rounded-[1.5rem] border border-slate-100">
            <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Judul</label>
            <input type="text" id="input-title"
              class="w-full bg-transparent font-bold text-lg outline-none"
              placeholder="Judul catatan...">
          </div>

          <div class="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100">
            <label class="block text-[10px] font-black text-slate-400 uppercase mb-4">Isi Catatan</label>
            <textarea id="input-content" rows="10"
              class="w-full bg-transparent text-lg font-semibold outline-none leading-relaxed placeholder:text-slate-300"
              placeholder="Tulis catatan..."></textarea>
          </div>

          <button onclick="saveNote()" id="btn-save"
            class="hidden w-full bg-blue-600 text-white py-6 rounded-[2rem] font-black shadow-xl shadow-blue-100 active:scale-95 transition-all uppercase tracking-widest text-sm">
            Simpan
          </button>
        </div>
      </div>
    </div>

    <!-- Modal detail -->
    <div id="modal" class="hidden-view fixed inset-0 z-[80] bg-black/40">
      <div class="max-w-xl mx-auto px-6 py-10">
        <div class="bg-white rounded-[2.5rem] p-8 shadow-2xl">

          <div class="flex items-center justify-between mb-4">
            <div id="modal-date" class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-400"></div>

            <div class="flex items-center gap-2">
              <button onclick="closeModal()" class="icon-btn" title="Tutup">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
              </button>

              <button onclick="startEditFromModal()" class="icon-btn" title="Edit">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931ZM16.862 4.487 19.5 7.125" />
                </svg>
              </button>

              <button onclick="deleteFromModal()" class="icon-btn" title="Hapus">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9 14.394 18m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                </svg>
              </button>
            </div>
          </div>

          <div class="mb-5">
            <span id="modal-title" class="stabilo-blue text-[14px] tracking-widest"></span>
          </div>

          <div id="modal-content"
               class="modal-scroll wrap-safe text-sm sm:text-base font-[700] text-slate-900 leading-relaxed whitespace-pre-wrap pr-1">
          </div>

        </div>
      </div>
    </div>

  </div>

  <script>
    // =========================
    // AUTO LOGOUT (1 jam)
    // =========================
    const SESSION_MS = 60 * 60 * 1000;
    let logoutTimer = null;

    function scheduleAutoLogout() {
      if (logoutTimer) clearTimeout(logoutTimer);

      const startStr = localStorage.getItem('sessionStartAt');
      const startAt = startStr ? Number(startStr) : Date.now();
      if (!startStr) localStorage.setItem('sessionStartAt', String(startAt));

      const now = Date.now();
      const elapsed = now - startAt;
      const remaining = SESSION_MS - elapsed;

      if (remaining <= 0) {
        logout(true);
        return;
      }

      logoutTimer = setTimeout(() => logout(true), remaining);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && localStorage.getItem('accessCode')) {
        scheduleAutoLogout();
      }
    });

    window.onload = () => {
      if (localStorage.getItem('accessCode')) {
        scheduleAutoLogout();
        showApp();
      }
    };

    function formatDateIndo(dateStr) {
      if (!dateStr) return "";
      const [y, m, d] = dateStr.split('-');
      return `${d}-${m}-${y}`;
    }

    function showView(viewName) {
      if (viewName === 'list') {
        document.getElementById('view-list').classList.remove('hidden-view');
        document.getElementById('view-form').classList.add('hidden-view');
        fetchNotes();
      } else {
        document.getElementById('view-list').classList.add('hidden-view');
        document.getElementById('view-form').classList.remove('hidden-view');
      }
    }

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: {
          ...options.headers,
          'x-access-code': localStorage.getItem('accessCode')
        }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.details || data.error || 'Request gagal');
      return data;
    }

    function showLoginError(msg = "Kode salah") {
      const el = document.getElementById('login-error');
      el.querySelector('div > div').textContent = msg;
      el.classList.remove('hidden');
      // auto hide setelah 2.2 detik
      setTimeout(() => hideLoginError(), 2200);
    }

    function hideLoginError() {
      document.getElementById('login-error').classList.add('hidden');
    }

    // Cek kode akses tanpa masuk halaman selanjutnya
    async function verifyAccessCode(code) {
      // Panggil endpoint yang sama, cukup GET list.
      // Jika salah akan 401 dari server.
      const res = await fetch('/api/notes', { headers: { 'x-access-code': code } });
      return res.ok; // ok true hanya untuk status 2xx [web:143]
    }

    async function login() {
      const input = document.getElementById('access-input');
      const btn = document.getElementById('btn-login');
      const val = (input.value || "").trim();
      if (!val) return alert("Masukkan kode!");

      btn.disabled = true;
      btn.textContent = "CEK...";

      try {
        const ok = await verifyAccessCode(val);
        if (!ok) {
          showLoginError("Kode salah");
          return; // STOP: jangan masuk app
        }

        localStorage.setItem('accessCode', val);
        localStorage.setItem('sessionStartAt', String(Date.now()));
        scheduleAutoLogout();
        showApp();
      } catch (e) {
        showLoginError("Gagal konek");
      } finally {
        btn.disabled = false;
        btn.textContent = "MASUK";
      }
    }

    function logout(auto = false) {
      localStorage.removeItem('accessCode');
      localStorage.removeItem('sessionStartAt');
      if (logoutTimer) clearTimeout(logoutTimer);
      if (auto) alert("Sesi habis (1 jam). Silakan login lagi.");
      location.reload();
    }

    function showApp() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden-view');
      showView('list');
    }

    function resetForm() {
      document.getElementById('note-id').value = '';
      document.getElementById('input-title').value = '';
      document.getElementById('input-content').value = '';
      document.getElementById('form-title').textContent = "Tambah Catatan";
    }

    function systemDateYYYYMMDD() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    async function fetchNotes() {
      const container = document.getElementById('notes-container');
      const counter = document.getElementById('count-notes');
      container.innerHTML = "";

      try {
        const notes = await apiFetch('/api/notes');
        counter.textContent = `${notes.length} catatan`;

        if (notes.length === 0) {
          container.className = "pt-16";
          container.innerHTML = `<div class="py-20 text-center text-slate-300 font-black uppercase tracking-widest text-xs">Belum ada catatan.</div>`;
          return;
        }

        container.className = "grid grid-cols-2 gap-4";

        for (const n of notes) {
          const card = document.createElement('button');
          card.className = "text-left bg-white border border-slate-100 rounded-[1.5rem] p-4 shadow-sm hover:shadow-md transition-shadow active:scale-[0.99]";
          card.onclick = () => openModal(n.id);

          const date = document.createElement('div');
          date.className = "text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-3";
          date.textContent = formatDateIndo(n.event_date);

          const titleWrap = document.createElement('div');
          titleWrap.className = "mb-3";
          const titleBadge = document.createElement('span');
          titleBadge.className = "stabilo-blue text-[11px] tracking-widest font-extrabold";
          titleBadge.textContent = (n.title || "Tanpa Judul");
          titleWrap.appendChild(titleBadge);

          const bodyEl = document.createElement('div');
          bodyEl.className = "wrap-safe clamp-5 text-[11px] font-[700] text-slate-700 leading-snug whitespace-pre-wrap";
          bodyEl.textContent = (n.content || "").trim();

          card.appendChild(date);
          card.appendChild(titleWrap);
          card.appendChild(bodyEl);
          container.appendChild(card);
        }
      } catch (err) {
        counter.textContent = "";
        container.className = "";
        container.innerHTML = `<div class="text-red-500 text-[10px] font-bold p-5 bg-red-50 rounded-2xl">ERROR: ${err.message}</div>`;
      }
    }

    let modalNote = null;

    async function openModal(id) {
      try {
        const note = await apiFetch(`/api/notes?id=${encodeURIComponent(id)}`);
        modalNote = note;

        document.getElementById('modal-date').textContent = formatDateIndo(note.event_date);
        document.getElementById('modal-title').textContent = note.title || "Tanpa Judul";
        document.getElementById('modal-content').textContent = note.content || "";

        document.getElementById('modal').classList.remove('hidden-view');
      } catch (err) {
        alert(err.message);
      }
    }

    function closeModal() {
      modalNote = null;
      document.getElementById('modal').classList.add('hidden-view');
    }

    function startEditFromModal() {
      if (!modalNote) return;
      document.getElementById('note-id').value = modalNote.id;
      document.getElementById('input-title').value = modalNote.title || "";
      document.getElementById('input-content').value = modalNote.content || "";
      document.getElementById('form-title').textContent = "Edit Catatan";
      closeModal();
      showView('form');
    }

    async function deleteFromModal() {
      if (!modalNote) return;
      if (!confirm("Hapus catatan ini?")) return;
      try {
        await apiFetch(`/api/notes?id=${encodeURIComponent(modalNote.id)}`, { method: 'DELETE' });
        closeModal();
        fetchNotes();
      } catch (err) {
        alert(err.message);
      }
    }

    async function saveNote() {
      const btn = document.getElementById('btn-save-icon');
      const id = document.getElementById('note-id').value || "";
      const title = document.getElementById('input-title').value;
      const content = document.getElementById('input-content').value;

      if (!title || !content) return alert("Isi semuanya dulu ya!");

      btn.disabled = true;

      try {
        const date = systemDateYYYYMMDD();

        await apiFetch('/api/notes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id ? Number(id) : undefined, date, title, content })
        });

        resetForm();
        showView('list');
      } catch (err) {
        alert("Gagal menyimpan: " + err.message);
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
  </script>
</body>
</html>
